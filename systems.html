<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AVIA SYSTEMS | Automatización a medida</title>
    <meta name="description" content="APIs, bots e integraciones para automatizar procesos críticos." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container section">
      <a class="link-chip" href="index.html">← Volver</a>
      <h1>AVIA SYSTEMS</h1>
      <p>Automatizamos procesos a medida para tu operación.</p>
      <figure class="product-hero">
        <img src="assets/mockup-systems.svg" alt="Maqueta de la plataforma AVIA SYSTEMS" loading="eager" />
      </figure>

      <section class="product-columns">
        <article class="info-card">
          <h2>Qué automatizamos</h2>
          <ul>
            <li>Flujos de aprobación internos.</li>
            <li>Integración de ERP/CRM.</li>
            <li>Bots para tareas repetitivas.</li>
          </ul>
        </article>

        <form class="login-card">
          <h2>Solicita una maqueta para tu proceso</h2>
          <label>Nombre</label>
          <input placeholder="Tu nombre" />
          <label>Correo</label>
          <input placeholder="tu@empresa.cl" />
          <label>Qué necesitas automatizar</label>
          <textarea rows="4" placeholder="Describe el proceso"></textarea>
          <button class="btn btn-primary" type="button">Solicitar cotización</button>
        </form>
      </section>
    </main>
  </body>
</html>
